services:
  api_motortech:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: api_motortech
    volumes:
      - ./api_motortech:/var/www/api_motortech
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8080/api_motortech
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: motortech
      DB_USERNAME: motortech123
      DB_PASSWORD: senhaSegura123
    depends_on:
      - mysql
    networks:
      - laravel_network

  nginx:
    image: nginx:latest
    container_name: nginx_motortech
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api_motortech:/var/www/api_motortech
    depends_on:
      - api_motortech
    networks:
      - laravel_network

  mysql:
    image: mysql:latest
    container_name: motortech_db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: motortech
      MYSQL_USER: motortech123
      MYSQL_PASSWORD: senhaSegura123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - laravel_network

volumes:
  mysql_data:

networks:
  laravel_network:
    driver: bridge
